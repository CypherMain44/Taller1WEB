<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Footer Grid — Equipo</title>
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Nunito:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #023e8a;
      font-family: 'Nunito', sans-serif;
      padding: 20px;
      min-height: 100vh;
    }

    /* GRID 2 filas × 4 columnas */
    .footer-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      grid-template-rows: auto auto;
      gap: 14px;
      max-width: 960px;
      margin: 0 auto;
    }

    .footer-cell {
      background: rgba(255,255,255,0.09);
      border-radius: 12px;
      padding: 14px 12px;
      text-align: center;
      border: 1px solid rgba(255,255,255,0.15);
      transition: background 0.3s, transform 0.3s;
    }
    .footer-cell:hover {
      background: rgba(255,255,255,0.18);
      transform: translateY(-4px);
    }
    .footer-cell .avatar {
      font-size: 2rem;
      display: block;
      margin-bottom: 6px;
    }
    .footer-cell h4 {
      font-family: 'Pacifico', cursive;
      font-size: 0.85rem;
      color: #f77f00;
      margin-bottom: 4px;
    }
    .footer-cell .role {
      font-size: 0.72rem;
      color: #90e0ef;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      margin-bottom: 4px;
    }
    .footer-cell p {
      font-size: 0.72rem;
      color: #b3d4f5;
      line-height: 1.4;
    }

    /* ---- RESPONSIVE 576px ---- */
    @media (max-width: 576px) {
      body { background: #880e4f; }   /* fondo cambia */
      .footer-grid {
        grid-template-columns: 1fr 1fr;
        grid-template-rows: repeat(4, auto);
      }
      .footer-cell h4,
      .footer-cell .role,
      .footer-cell p {
        font-size: 0.5rem;  /* letra cambia a 0.5rem */
      }
      .footer-cell .avatar { font-size: 1.4rem; }
    }
  </style>
</head>
<body>

<div class="footer-grid">

  <!-- FILA 1 -->
  <div class="footer-cell">
    <h4>Javier Alean</h4>
    <p>Lider del grupo 6 </p>
  </div>

  <div class="footer-cell">
    <h4>David Soto</h4>
    <p>Integrante 1</p>
  </div>

  <div class="footer-cell">
    <h4>David Sandoval</h4>
    <p>Integrante 2</p>
  </div>

  <div class="footer-cell">
    <h4>Winyi Galindo</h4>
    <p>Integrante 3</p>
  </div>

  <!-- FILA 2 -->
  <div class="footer-cell">
    <span class="avatar">😎</span>
    <p>Hizo el carrusel</p>
  </div>

  <div class="footer-cell">
    <span class="avatar">📚</span>
    <p>Hizo cuestionario</p>
  </div>

  <div class="footer-cell">
    <span class="avatar">👽</span>
    <p>Hizo mosaico</p>
  </div>

  <div class="footer-cell">
    <span class="avatar">🤑</span>
    <p>Hizo cuento</p>
  </div>

</div>

</body>
</html>
