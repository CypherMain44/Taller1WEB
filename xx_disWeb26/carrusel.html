<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carrusel Animales Domésticos</title>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body class="bg-light">
  <div class="container mt-5">
    <div id="carouselAnimales" class="carousel slide" data-bs-ride="carousel">
      <div class="carousel-indicators" id="indicadores"></div>
      <div class="carousel-inner" id="contenedorCards"></div>

      <!-- contron atrás -->
      <button class="carousel-control-prev" type="button" data-bs-target="#carouselAnimales" data-bs-slide="prev">
        <span class="carousel-control-prev-icon"></span>
      </button>

      <!-- control adelante -->
      <button class="carousel-control-next" type="button" data-bs-target="#carouselAnimales" data-bs-slide="next">
        <span class="carousel-control-next-icon"></span>
      </button>

    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  <script defer>
    const animales = [
      { imagen: 'perro', name: 'Perro', desc: 'Fiel compañero del ser humano, inteligente y cariñoso.', badge: 'Canino' },
      { imagen: 'gato', name: 'Gato', desc: 'Independiente y curioso, experto en mimos selectivos.', badge: 'Felino' },
      { imagen: 'hamster', name: 'Hámster', desc: 'Pequeño y activo, le encanta correr en su ruedita.', badge: 'Roedor' },
      { imagen: 'conejo', name: 'Conejo', desc: 'Suave y tranquilo, disfruta de verduras y jugar.', badge: 'Lagomorfo' },
    ];

    const cont = document.getElementById("contenedorCards")
    const indicadores = document.getElementById("indicadores");
    animales.forEach((animal, index) => {
      let activo = index === 0 ? "active":"";
      let slide = `
      <div class="carousel-item ${activo}">
        <div class="d-flex justify-content-center">
          <div class="card" style="width: 18rem; height: 22rem">
            <img src="images/${animal.imagen}.jpg" class="card-img-top">
            <div class="card-body">
              <h5 class="card-title">${animal.name}</h5>
              <p class="card-text">${animal.desc}</p>
            </div>
          </div>
        </div>
      </div>
      `

      cont.innerHTML += slide;

      let indicador = `
      <button type="button" data-bs-target="#carouselAnimales" data-bs-slide-to="${index}" class="${activo}"></button>
      `

      indicadores.innerHTML += indicador; 
    });
  </script>
</body>
</html>
