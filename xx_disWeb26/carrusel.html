<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carrusel Animales Domésticos</title>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: linear-gradient(135deg, #e0f7fa 0%, #b2ebf2 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Baloo 2', cursive;
      overflow: hidden;
    }
    .carousel-wrapper {
      width: 100%;
      overflow: hidden;
      position: relative;
      padding: 20px 0;
    }
    .carousel-track {
      display: flex;
      gap: 24px;
      animation: scrollCards 16s linear infinite;
      width: max-content;
    }
    .carousel-track:hover { animation-play-state: paused; }
    @keyframes scrollCards {
      0%   { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }
    .card {
      background: white;
      border-radius: 20px;
      width: 200px;
      flex-shrink: 0;
      padding: 20px 16px 16px;
      box-shadow: 0 8px 24px rgba(0,150,180,0.15);
      text-align: center;
      transition: transform 0.3s, box-shadow 0.3s;
      border: 3px solid transparent;
    }
    .card:hover {
      transform: translateY(-8px) scale(1.04);
      box-shadow: 0 16px 36px rgba(0,150,180,0.28);
      border-color: #00bcd4;
    }
    .card-emoji { font-size: 3.5rem; margin-bottom: 10px; display: block; }
    .card h3 {
      font-size: 1.2rem;
      color: #00838f;
      margin-bottom: 6px;
    }
    .card p {
      font-size: 0.8rem;
      color: #555;
      line-height: 1.4;
      font-family: sans-serif;
    }
    .card-badge {
      display: inline-block;
      background: #e0f7fa;
      color: #006064;
      border-radius: 20px;
      padding: 2px 10px;
      font-size: 0.7rem;
      margin-top: 8px;
      font-weight: bold;
      letter-spacing: 0.05em;
    }
    /* Fade edges */
    .carousel-wrapper::before,
    .carousel-wrapper::after {
      content: '';
      position: absolute;
      top: 0; bottom: 0;
      width: 60px;
      z-index: 2;
      pointer-events: none;
    }
    .carousel-wrapper::before { left: 0; background: linear-gradient(to right, #e0f7fa, transparent); }
    .carousel-wrapper::after  { right: 0; background: linear-gradient(to left, #b2ebf2, transparent); }
  </style>
</head>
<body>
<div class="carousel-wrapper">
  <div class="carousel-track" id="track"></div>
</div>
<script>
  const animals = [
    { emoji: '🐶', name: 'Perro', desc: 'Fiel compañero del ser humano, inteligente y cariñoso.', badge: 'Canino' },
    { emoji: '🐱', name: 'Gato', desc: 'Independiente y curioso, experto en mimos selectivos.', badge: 'Felino' },
    { emoji: '🐹', name: 'Hámster', desc: 'Pequeño y activo, le encanta correr en su ruedita.', badge: 'Roedor' },
    { emoji: '🐰', name: 'Conejo', desc: 'Suave y tranquilo, disfruta de verduras y jugar.', badge: 'Lagomorfo' },
  ];

  const track = document.getElementById('track');
  // Duplicate 4 times for infinite seamless loop
  for (let i = 0; i < 4; i++) {
    animals.forEach(a => {
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `
        <span class="card-emoji">${a.emoji}</span>
        <h3>${a.name}</h3>
        <p>${a.desc}</p>
        <span class="card-badge">${a.badge}</span>
      `;
      track.appendChild(card);
    });
  }
</script>
</body>
</html>
